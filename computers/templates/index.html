{% extends 'master.html' %}

{% block title %}
Home Page
{% endblock %}

{% block content %}
<div class='mainText'>
    <ul>
        <li>
            <a href='/admin'>
                Admin
            </a>
        </li>
    </ul>

    <h1>RMC Computers</h1>
    <hr>
    <table>
        <tr>
            <th>Room</th>
            <th>In Use</th>
        </tr>
        {% for room in list %}
        <tr>
            <td>
                {{room.roomName}}
            </td>
            <td>
                {{room.amountOnline}}/{{room.total}}
                <form method='GET' action='./details.html?id={{room.roomId}}'>
                    <input type='submit' value='button'>
                </form>
            </td>
        </tr>
        {% endfor %}
    </table>
</div>


{% endblock %}
